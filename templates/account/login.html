{% extends 'account/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock %}

{% block inner_content %}
<div class="card p-8">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Welcome back!</h1>
    <p class="text-gray-500 mt-1">Sign in to continue learning</p>
  </div>

  <form method="post" action="{% url 'account_login' %}" class="space-y-5">
    {% csrf_token %}
    {% crispy form %}
    <button type="submit" class="btn-primary w-full btn-lg mt-2">Sign In</button>
  </form>

  <div class="mt-6 text-center text-sm text-gray-500">
    <a href="{% url 'account_reset_password' %}" class="text-indigo-600 hover:underline">Forgot your password?</a>
  </div>
  <div class="mt-4 text-center text-sm">
    <span class="text-gray-500">Don't have an account?</span>
    <a href="{% url 'account_signup' %}" class="ml-1 text-indigo-600 font-semibold hover:underline">Sign up free</a>
  </div>
</div>
{% endblock %}
