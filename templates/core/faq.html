{% extends 'base.html' %}
{% block title %}FAQ{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-16">
  <h1 class="section-title text-center">Frequently Asked Questions</h1>
  <div class="mt-10 space-y-4">
    {% for item in faqs %}
    <div class="card" x-data="{ open: false }">
      <button @click="open = !open" class="w-full flex justify-between items-center px-6 py-4 text-left">
        <span class="font-semibold text-gray-900">{{ item.question }}</span>
        <svg :class="open ? 'rotate-180' : ''" class="w-5 h-5 text-gray-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div x-show="open" x-transition class="px-6 pb-4 text-gray-600 text-sm leading-relaxed border-t border-gray-100 pt-4">
        {{ item.answer }}
      </div>
    </div>
    {% empty %}
    <div class="text-center py-12 text-gray-400">
      <p>FAQ content coming soon.</p>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
