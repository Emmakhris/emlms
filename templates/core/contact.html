{% extends 'base.html' %}
{% block title %}Contact{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-16">
  <h1 class="section-title">Contact Us</h1>
  <form method="post" class="mt-8 space-y-5">
    {% csrf_token %}
    <div>
      <label class="label">Your Name</label>
      <input type="text" name="name" required class="input-field" placeholder="John Doe" />
    </div>
    <div>
      <label class="label">Email Address</label>
      <input type="email" name="email" required class="input-field" placeholder="john@example.com" />
    </div>
    <div>
      <label class="label">Message</label>
      <textarea name="message" rows="5" required class="input-field" placeholder="How can we help?"></textarea>
    </div>
    <button type="submit" class="btn-primary">Send Message</button>
  </form>
</div>
{% endblock %}
