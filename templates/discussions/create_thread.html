{% extends 'base.html' %}
{% block title %}New Thread — {{ course.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <div class="mb-4">
    <a href="{% url 'discussions:thread_list' course.slug %}" class="text-sm text-indigo-600 hover:text-indigo-800">← Discussion Board</a>
  </div>

  <div class="card p-8">
    <h1 class="text-xl font-bold text-gray-900 mb-6">Start a New Thread</h1>

    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="label">Type</label>
        <select name="thread_type" class="input-field">
          <option value="question">Question</option>
          <option value="discussion">Discussion</option>
        </select>
      </div>
      <div>
        <label class="label">Title</label>
        <input type="text" name="title" class="input-field" required placeholder="What's your question or topic?" />
      </div>
      <div>
        <label class="label">Details</label>
        <textarea name="body" rows="6" class="input-field" required placeholder="Provide more context…"></textarea>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="btn-primary">Post Thread</button>
        <a href="{% url 'discussions:thread_list' course.slug %}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
