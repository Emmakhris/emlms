{% extends 'base.html' %}
{% block title %}Edit Section{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="mb-4">
    <a href="{% url 'courses:curriculum' course.slug %}" class="text-sm text-indigo-600 hover:text-indigo-800">← Curriculum</a>
  </div>
  <div class="card p-8">
    <h1 class="text-xl font-bold text-gray-900 mb-6">Edit Section</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="label">Title</label>
        <input type="text" name="title" value="{{ section.title }}" class="input-field" required />
      </div>
      <div>
        <label class="label">Description (optional)</label>
        <textarea name="description" rows="3" class="input-field">{{ section.description }}</textarea>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="btn-primary">Save Changes</button>
        <a href="{% url 'courses:curriculum' course.slug %}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
